<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" width="400" height="160">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="25%" style="stop-color:#F5D78E;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4A843;stop-opacity:1" />
      <stop offset="75%" style="stop-color:#F0C96A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A8801E;stop-opacity:1" />
    </linearGradient>

    <!-- Gold shimmer for decorative elements -->
    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8B6914;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#F5D78E;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#F5D78E;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="softShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#D4A843" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Black background with subtle border -->
  <rect width="400" height="160" fill="#0A0A0A" rx="4"/>
  
  <!-- Outer gold border -->
  <rect x="6" y="6" width="388" height="148" fill="none" stroke="url(#shimmer)" stroke-width="0.8" rx="2"/>
  
  <!-- Inner thin border -->
  <rect x="10" y="10" width="380" height="140" fill="none" stroke="#D4A843" stroke-width="0.3" rx="1" opacity="0.4"/>

  <!-- Top decorative line -->
  <line x1="40" y1="28" x2="360" y2="28" stroke="url(#shimmer)" stroke-width="0.6" opacity="0.7"/>
  
  <!-- Corner ornaments top-left -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <line x1="20" y1="20" x2="36" y2="20"/>
    <line x1="20" y1="20" x2="20" y2="36"/>
    <circle cx="20" cy="20" r="2" fill="url(#goldGrad)" stroke="none"/>
  </g>
  
  <!-- Corner ornaments top-right -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <line x1="380" y1="20" x2="364" y2="20"/>
    <line x1="380" y1="20" x2="380" y2="36"/>
    <circle cx="380" cy="20" r="2" fill="url(#goldGrad)" stroke="none"/>
  </g>
  
  <!-- Corner ornaments bottom-left -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <line x1="20" y1="140" x2="36" y2="140"/>
    <line x1="20" y1="140" x2="20" y2="124"/>
    <circle cx="20" cy="140" r="2" fill="url(#goldGrad)" stroke="none"/>
  </g>
  
  <!-- Corner ornaments bottom-right -->
  <g fill="none" stroke="url(#goldGrad)" stroke-width="0.8">
    <line x1="380" y1="140" x2="364" y2="140"/>
    <line x1="380" y1="140" x2="380" y2="124"/>
    <circle cx="380" cy="140" r="2" fill="url(#goldGrad)" stroke="none"/>
  </g>

  <!-- Small diamond center top -->
  <polygon points="200,22 204,28 200,34 196,28" fill="url(#goldGrad)" opacity="0.9"/>

  <!-- Main text: FLIRTY -->
  <text
    x="200"
    y="100"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="68"
    font-weight="400"
    letter-spacing="16"
    text-anchor="middle"
    fill="url(#goldGrad)"
    filter="url(#softShadow)"
    font-style="italic"
  >FLIRTY</text>



  <!-- Bottom decorative line -->
  <line x1="40" y1="132" x2="360" y2="132" stroke="url(#shimmer)" stroke-width="0.6" opacity="0.7"/>

  <!-- Small decorative dots -->
  <circle cx="80" cy="80" r="1.5" fill="#D4A843" opacity="0.3"/>
  <circle cx="320" cy="80" r="1.5" fill="#D4A843" opacity="0.3"/>
</svg>
